<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>결제 (UI 목업) | 사장님 홍보 진단 키트</title>
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<div id="site-header"></div>

<main>
  <section class="section" style="padding-top:40px;">
    <div class="wrap-narrow">
      <div class="mock-banner">이 결제 화면은 UI 목업입니다 · 실제 결제가 진행되지 않습니다</div>
    </div>

    <div class="wrap" id="checkout-root"></div>
  </section>
</main>

<div id="site-footer"></div>

<script src="assets/diagnosis-data.js"></script>
<script>
(function(){
  const PLANS = {
    starter: { name:'손님이 찾아오는 기본기 완성 키트 (Starter)', price:19900, items:['순서대로 알려주는 가이드','이것만 하면 끝나는 필수 세팅 체크리스트','바로 쓰는 홍보 문구 30개','뭘 올렸는지 한눈에 정리되는 관리표','그대로 따라만 하면 끝나는 영상 2~3개'] },
    pro: { name:'반복 업무 손 떼고 손님 늘리는 키트 (Pro)', price:49000, items:['Starter 구성 전체','손 안 대도 나가는 리뷰 요청·문의 응대 자동화','디자이너 없이도 예쁜 홍보물','어떤 상황에도 바로 꺼내 쓰는 문구 150개','나쁜 리뷰도 매끄럽게 넘기는 대응법','그대로 따라만 하면 끝나는 영상 전체'] },
    pack: { name:'우리 업종에 딱 맞는 홍보 세트', price:39000, items:['우리 업종에서만 통하는 문구','우리 업종에 딱 맞는 홍보물 템플릿','우리 업종 손님이 검색할 키워드로 쓴 글','우리 업종에서 자주 나오는 리뷰 대응법','업종 맞춤 자동화(선택)'] },
  };
  const params = new URLSearchParams(location.search);
  const planKey = PLANS[params.get('plan')] ? params.get('plan') : 'starter';
  const plan = PLANS[planKey];
  const root = document.getElementById('checkout-root');
  let step = 'form'; // form | done
  let method = 'card';

  function won(n){ return n.toLocaleString('ko-KR') + '원'; }

  function render(){
    if (step === 'form') return renderForm();
    return renderDone();
  }

  function renderForm(){
    root.innerHTML = `
      <div class="checkout-grid">
        <div>
          <div class="co-panel">
            <h3>결제 정보</h3>
            <div class="field"><label>이메일</label><input type="email" id="ck-email" placeholder="owner@example.com" /></div>
            <div class="pay-method-row">
              <button class="pay-method ${method==='card'?'active':''}" data-m="card">신용/체크카드</button>
              <button class="pay-method ${method==='kakao'?'active':''}" data-m="kakao">카카오페이</button>
              <button class="pay-method ${method==='naver'?'active':''}" data-m="naver">네이버페이</button>
            </div>
            <p style="font-size:12.5px;color:var(--ink-faint);">※ 목업 화면이므로 실제 카드 정보 입력란은 표시하지 않습니다.</p>
          </div>
          <div class="co-panel">
            <h3>받으실 구성</h3>
            <ul style="display:flex;flex-direction:column;gap:8px;">
              ${plan.items.map(it => `<li style="font-size:14px;color:var(--ink-soft);">✓ ${it}</li>`).join('')}
            </ul>
          </div>
        </div>

        <div class="co-panel">
          <h3>주문 요약</h3>
          <div class="summary-row"><span>${plan.name}</span><span>${won(plan.price)}</span></div>
          <div class="summary-row"><span>할인</span><span>0원</span></div>
          <div class="summary-row total"><span>총 결제 금액</span><span>${won(plan.price)}</span></div>
          <button class="btn btn-primary btn-block" id="btn-pay" style="margin-top:20px;">${won(plan.price)} 결제하기</button>
          <p style="font-size:11.5px;color:var(--ink-faint);margin-top:14px;line-height:1.7;">
            결제 완료 즉시 다운로드 페이지로 이동합니다. 제공물은 사이트의 다운로드 페이지에서만 제공되며, 이메일에는 파일 첨부 없이 다운로드 페이지 링크만 안내됩니다.
          </p>
        </div>
      </div>
    `;
    root.querySelectorAll('.pay-method').forEach(btn => {
      btn.addEventListener('click', () => { method = btn.dataset.m; render(); });
    });
    document.getElementById('btn-pay').addEventListener('click', () => {
      step = 'done'; render(); window.scrollTo({top:0,behavior:'smooth'});
    });
  }

  function renderDone(){
    root.innerHTML = `
      <div class="wrap-narrow" style="text-align:center;padding:24px 0;">
        <div style="width:76px;height:76px;border-radius:50%;background:var(--teal-soft);color:var(--teal);
          display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 20px;">✓</div>
        <h2 style="font-size:28px;margin-bottom:10px;">결제가 완료되었습니다</h2>
        <p style="color:var(--ink-soft);margin-bottom:6px;">${plan.name} · ${won(plan.price)}</p>
        <p style="color:var(--ink-faint);font-size:13px;margin-bottom:28px;">구매 확인 메일에는 다운로드 페이지 링크만 안내되며, 파일이 첨부되지 않습니다.</p>
        <a class="btn btn-primary" href="download.html?plan=${planKey}">다운로드 페이지로 이동 →</a>
      </div>
    `;
  }

  render();
})();
</script>
</body>
</html>
